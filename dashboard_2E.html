<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #10b981;
            --danger: #ef4444;
            --card-bg: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(255, 255, 255, 0.4);
            --nav-border: rgba(255, 255, 255, 0.3);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --body-bg: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            --body-bg-color: transparent;
            --table-border: rgba(0,0,0,0.05);
            --th-bg: rgba(0,0,0,0.02);
        }

        body.dark-theme {
            --card-bg: rgba(20, 20, 40, 0.75);
            --nav-bg: rgba(10, 10, 25, 0.6);
            --nav-border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --body-bg: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --table-border: rgba(255,255,255,0.07);
            --th-bg: rgba(255,255,255,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background: var(--body-bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: background 0.4s ease, color 0.3s ease;
        }

        .nav-sidebar {
            width: 75px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--nav-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 0;
            gap: 1rem;
            flex-shrink: 0;
            overflow-y: auto;
            scrollbar-width: none;
            transition: background 0.4s ease;
        }
        .nav-sidebar::-webkit-scrollbar { display: none; }

        .theme-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--nav-border);
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            margin-top: auto;
        }
        .theme-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .nav-item {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--card-bg);
            border: 1px solid transparent;
        }

        .nav-item:hover {
            transform: translateY(-2px);
            background: white;
            color: var(--primary);
            border-color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }

        .nav-item .icon { font-size: 1.4rem; margin-bottom: 2px; }
        .nav-item .label { font-size: 0.7rem; font-weight: 700; }

        .nav-divider {
            width: 40%;
            height: 2px;
            background: rgba(0,0,0,0.05);
            border-radius: 2px;
            margin: 0.5rem 0;
        }

        .container {
            flex: 1;
            height: 100vh;
            display: flex;
            gap: clamp(0.5rem, 1.5vw, 1.25rem);
            padding: clamp(0.5rem, 2vw, 1.25rem);
            overflow: hidden;
        }

        .sidebar {
            width: clamp(260px, 25vw, 320px);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
            padding-right: 0.5rem;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
        }

        header {
            margin-bottom: 0.5rem;
            text-align: left;
        }

        header h1 {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            background: linear-gradient(to right, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
        }

        header p {
            color: var(--text-muted);
            font-size: clamp(0.75rem, 1.5vw, 0.85rem);
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--nav-border);
            transition: transform 0.3s ease, background 0.4s ease;
        }
        
        .stat-card.compact { padding: 1rem; }

        .stat-card:hover { transform: translateY(-3px); }

        .stat-card h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .sheets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(clamp(200px, 25vw, 300px), 1fr));
            gap: 1rem;
        }

        .sheet-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 0.75rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .sheet-card:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .sheet-title { font-size: 1rem; font-weight: 700; color: var(--primary); }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th, td {
            padding: 0.5rem;
            text-align: center;
            border-bottom: 1px solid var(--table-border);
            color: var(--text-main);
        }

        th { background: var(--th-bg); color: var(--text-muted); font-weight: 600; }

        footer {
            margin-top: auto;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 1rem 0;
        }
    </style>
</head>
<body>
    <!-- Navigation Sidebar -->
    <nav class="nav-sidebar" id="nav-sidebar">
        <a href="dashboard.html" class="nav-item" id="nav-home" title="종합 대시보드">
            <span class="icon">🏠</span>
            <span class="label">종합</span>
        </a>
        <div class="nav-divider"></div>
        <!-- Line links will be injected here -->
        <button class="theme-btn" id="theme-toggle-btn" title="테마 전환" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
        </button>
    </nav>

    <!-- Main Container -->
    <div class="container" id="main-container">
        <!-- Sidebar Segment -->
        <aside class="sidebar">
            <header>
                <h1 id="sidebar-title">ICT Dashboard</h1>
                <p id="sidebar-subtitle">Performance Metrics</p>
            </header>

            <div id="stats-area">
                <!-- Gauge and key stats -->
            </div>

            <div class="stat-card compact" id="summary-card" style="margin-top: 0.5rem; flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column;">
                <h2 id="summary-title" style="flex-shrink:0; margin-bottom: 0.5rem; color: var(--primary); font-size: 0.9rem;">📊 상세 요약</h2>
                <div style="flex: 1; overflow-y: auto; min-height: 0;">
                    <table id="summary-table">
                        <thead>
                            <tr>
                                <th id="th-line">라인</th>
                                <th id="th-total">전체</th>
                                <th id="th-rate">직행율</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <footer>
                &copy; 2026 ICT Data Team
            </footer>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- OVERVIEW VIEW -->
            <div id="overview-view" style="display: none; height: 100%; flex-direction: column; gap: 1rem;">
                <div class="stat-card" style="flex-shrink: 0; max-height: 250px;">
                    <h3 style="font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: none; font-weight: 700;">
                        <span style="color: var(--primary); margin-right: 0.5rem;">●</span> 3월 일간 평균 직행율 추이
                    </h3>
                    <div style="height: 180px; width: 100%;">
                        <canvas id="daily-avg-chart"></canvas>
                    </div>
                </div>

                <div class="scroll-area">
                    <div class="sheets-grid" id="sheets-grid">
                        <!-- Cards -->
                    </div>
                </div>
            </div>

            <!-- DEEP-DIVE VIEW -->
            <div id="deep-dive-view" style="display: none; height: 100%; flex-direction: column; gap: 1rem;">
                <div class="stat-card" style="flex-shrink: 0; min-height: 350px; height: 50%;">
                    <h3 id="line-chart-title" style="font-size: 1.1rem; margin-bottom: 1rem; text-transform: none; font-weight: 700;">
                        성과 추이 분석
                    </h3>
                    <div style="height: calc(100% - 3rem); width: 100%;">
                        <canvas id="line-detail-chart"></canvas>
                    </div>
                </div>
                
                <div class="stat-card" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">
                    <h3 style="font-size: 1rem; margin-bottom: 1rem; text-transform: none; font-weight: 700;">일자별 상세 기록</h3>
                    <div style="flex: 1; overflow-y: auto;">
                        <table id="line-detail-table">
                            <thead>
                                <tr>
                                    <th>일자</th>
                                    <th>전체</th>
                                    <th>합격(G)</th>
                                    <th>불합격(N)</th>
                                    <th>직행율</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Error Overlay -->
    <div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; padding: 2rem; text-align: center;">
        <div style="background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid var(--danger);">
            <h2 style="color: var(--danger); margin-bottom: 1rem;">❌ 오류 발생</h2>
            <p id="error-message" style="margin-bottom: 1.5rem;"></p>
            <button onclick="location.reload()" style="padding: 0.5rem 1.5rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; cursor: pointer;">새로고침</button>
        </div>
    </div>

        if (typeof Chart !== 'undefined') {
            Chart.register(ChartDataLabels);
            logger("Chart.js ready");
        }

        function initNavigation() {
            const nav = id('nav-sidebar');
            if (typeof allLineIds === 'undefined') return;
            if (typeof activeLineId === 'undefined' || activeLineId === null) id('nav-home').classList.add('active');

            allLineIds.sort().forEach(lineId => {
                const a = document.createElement('a');
                a.href = `dashboard_${lineId}.html`;
                a.className = `nav-item ${typeof activeLineId !== 'undefined' && activeLineId === lineId ? 'active' : ''}`;
                a.innerHTML = `<span class="icon">L</span><span class="label" style="font-size:0.6rem;">${lineId}</span>`;
                nav.appendChild(a);
            });
        }

        function renderSidebarStats(data) {
            const area = id('stats-area');
            const rate = data.pass_rate;
            
            area.innerHTML = `
                <div class="stat-card" style="padding: 1rem;">
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                        <div style="width: 140px; height: 140px; position: relative;">
                            <canvas id="gauge-canvas"></canvas>
                            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.4rem; font-weight: 800; color: var(--primary);">
                                ${rate}%
                            </div>
                        </div>
                        <h3 style="font-size: 0.75rem; color: var(--text-muted); text-align: center;">ICT 직행율</h3>
                    </div>
                    <div style="border-top: 1px solid rgba(0,0,0,0.05); padding-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                            <span>전체 생산</span><span style="font-weight:700;">${data.total.toLocaleString()}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                            <span>합격 / 불합격</span>
                            <span><span style="color:var(--success)">${data.pass.toLocaleString()}</span> / <span style="color:var(--danger)">${data.fail.toLocaleString()}</span></span>
                        </div>
                    </div>
                </div>
            `;

            new Chart(id('gauge-canvas').getContext('2d'), {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [data.pass, data.fail],
                        backgroundColor: [rate < 95 ? 'var(--danger)' : '#1a3a8a', '#d1d5db'],
                        borderWidth: 0,
                        circumference: 270,
                        rotation: 225
                    }]
                },
                options: { maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false }, datalabels: { display: false } } }
            });
        }

        function renderOverview() {
            id('overview-view').style.display = 'flex';
            renderSidebarStats(rawData.overall);
            
            new Chart(id('daily-avg-chart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: rawData.daily_averages.map(d => d.date),
                    datasets: [{
                        data: rawData.daily_averages.map(d => d.pass_rate),
                        backgroundColor: 'rgba(99, 102, 241, 0.7)',
                        borderRadius: 4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        datalabels: { anchor: 'end', align: 'top', font: { size: 9 }, formatter: (v) => v + '%' }
                    },
                    scales: { 
                        y: { min: 80, max: 100, ticks: { font: { size: 9 } } },
                        x: { ticks: { font: { size: 8 }, maxRotation: 45 } }
                    }
                }
            });

            const grid = id('sheets-grid');
            rawData.lines.forEach((line, idx) => {
                const card = document.createElement('div');
                card.className = 'sheet-card';
                card.onclick = () => window.location.href = `dashboard_${line.line_id}.html`;
                card.innerHTML = `
                    <div class="sheet-header">
                        <div class="sheet-title">Line ${line.line_id}</div>
                        <div class="badge" style="background:${line.pass_rate < 95 ? '#fee2e2':'#d1fae5'}; color:${line.pass_rate < 95 ? '#991b1b':'#065f46'}">
                            ${line.pass_rate}%
                        </div>
                    </div>
                    <div style="height: 60px;"><canvas id="mini-chart-${idx}"></canvas></div>
                `;
                grid.appendChild(card);
                new Chart(id(`mini-chart-${idx}`).getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: line.trend.map(d => d.date),
                        datasets: [{
                            data: line.trend.map(d => d.pass_rate),
                            borderColor: 'var(--primary)',
                            tension: 0.4,
                            pointRadius: 0,
                            fill: true,
                            backgroundColor: 'rgba(99, 102, 241, 0.05)'
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { x: { display: false }, y: { display: false, min: 80, max: 105 } } }
                });
            });

            const tbody = document.querySelector('#summary-table tbody');
            rawData.lines.forEach(line => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:700; color:var(--primary)">${line.line_id}</td>
                    <td>${line.total.toLocaleString()}</td>
                    <td style="color:${line.pass_rate < 95 ? 'var(--danger)':'var(--success)'}; font-weight:700;">${line.pass_rate}%</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderDeepDive(lineId) {
            const line = rawData.lines.find(l => l.line_id === lineId);
            if (!line) return;
            id('deep-dive-view').style.display = 'flex';
            id('sidebar-title').innerText = `Line ${lineId}`;
            id('line-chart-title').innerText = `Line ${lineId} 상세 성과 분석`;
            id('summary-title').innerText = "🏭 생산 모델";
            id('th-line').innerText = "모델명";
            id('th-total').innerText = "-";
            id('th-rate').innerText = "-";
            
            const tbody = document.querySelector('#summary-table tbody');
            line.models.forEach(m => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="3" style="font-size:0.7rem; text-align:left;">${m}</td>`;
                tbody.appendChild(tr);
            });

            renderSidebarStats(line);

            new Chart(id('line-detail-chart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: line.trend.map(d => d.date),
                    datasets: [{
                        label: '직행율 (%)',
                        data: line.trend.map(d => d.pass_rate),
                        borderColor: 'var(--primary)',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#fff', pointBorderWidth: 2
                    }, {
                        label: '목표 (95%)',
                        data: line.trend.map(() => 95),
                        borderColor: 'var(--danger)',
                        borderDash: [5, 5], pointRadius: 0, fill: false
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { datalabels: { display: true, align: 'top', font: { weight: 'bold', size: 10 }, formatter: v => v + '%' } }, scales: { y: { min: 80, max: 105 }, x: { ticks: { font: { size: 9 }, maxRotation: 45 } } } }
            });

            const recordBody = id('line-detail-table').querySelector('tbody');
            line.trend.slice().reverse().forEach(d => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:700;">${d.date}</td>
                    <td>${d.total.toLocaleString()}</td>
                    <td style="color:var(--success)">${d.pass.toLocaleString()}</td>
                    <td style="color:var(--danger)">${d.fail.toLocaleString()}</td>
                    <td style="font-weight:700; color:${d.pass_rate < 95 ? 'var(--danger)':'var(--primary)'}">${d.pass_rate}%</td>
                `;
                recordBody.appendChild(tr);
            });
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-theme');
            id('theme-icon').innerText = isDark ? '☀️' : '🌙';
            localStorage.setItem('ict_theme', isDark ? 'dark' : 'light');
        }

        // Restore saved theme
        (function() {
            const saved = localStorage.getItem('ict_theme');
            if (saved === 'dark') {
                document.body.classList.add('dark-theme');
                const btn = id('theme-icon');
                if (btn) btn.innerText = '☀️';
            }
        })();

        try {
            if (typeof rawData === 'undefined') throw new Error("Data Error");
            initNavigation();
            if (typeof activeLineId !== 'undefined' && activeLineId !== null) renderDeepDive(activeLineId);
            else renderOverview();
        } catch (e) {
            id('error-overlay').style.display = 'flex';
            id('error-message').innerText = e.message;
        }
    </script>
</body>
</html>
