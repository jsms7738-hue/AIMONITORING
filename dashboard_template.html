<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #10b981;
            --danger: #ef4444;
            --card-bg: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(255, 255, 255, 0.4);
            --nav-border: rgba(255, 255, 255, 0.3);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --body-bg: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            --body-bg-color: transparent;
            --table-border: rgba(0,0,0,0.05);
            --th-bg: rgba(0,0,0,0.02);
        }

        body.dark-theme {
            --card-bg: rgba(20, 20, 40, 0.75);
            --nav-bg: rgba(10, 10, 25, 0.6);
            --nav-border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --body-bg: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --table-border: rgba(255,255,255,0.07);
            --th-bg: rgba(255,255,255,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background: var(--body-bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: background 0.4s ease, color 0.3s ease;
        }

        .nav-sidebar {
            width: 75px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--nav-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 0;
            gap: 1rem;
            flex-shrink: 0;
            overflow-y: auto;
            scrollbar-width: none;
            transition: background 0.4s ease;
        }
        .nav-sidebar::-webkit-scrollbar { display: none; }

        .theme-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--nav-border);
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            margin-top: auto;
        }
        .theme-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .nav-item {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--card-bg);
            border: 1px solid transparent;
        }

        .nav-item:hover {
            transform: translateY(-2px);
            background: white;
            color: var(--primary);
            border-color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }

        .nav-item .icon { font-size: 1.4rem; margin-bottom: 2px; }
        .nav-item .label { font-size: 0.7rem; font-weight: 700; }

        .nav-divider {
            width: 40%;
            height: 2px;
            background: rgba(0,0,0,0.05);
            border-radius: 2px;
            margin: 0.5rem 0;
        }

        .container {
            flex: 1;
            height: 100vh;
            display: flex;
            gap: clamp(0.5rem, 1.5vw, 1.25rem);
            padding: clamp(0.5rem, 2vw, 1.25rem);
            overflow: hidden;
        }

        .sidebar {
            width: clamp(260px, 25vw, 320px);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
            padding-right: 0.5rem;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
        }

        header {
            margin-bottom: 0.5rem;
            text-align: left;
        }

        header h1 {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            background: linear-gradient(to right, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
        }

        header p {
            color: var(--text-muted);
            font-size: clamp(0.75rem, 1.5vw, 0.85rem);
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--nav-border);
            transition: transform 0.3s ease, background 0.4s ease;
        }
        
        .stat-card.compact { padding: 1rem; }

        .stat-card:hover { transform: translateY(-3px); }

        .stat-card h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .sheets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(clamp(200px, 25vw, 300px), 1fr));
            gap: 1rem;
        }

        .sheet-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 0.75rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .sheet-card:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .sheet-title { font-size: 1rem; font-weight: 700; color: var(--primary); }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th, td {
            padding: 0.5rem;
            text-align: center;
            border-bottom: 1px solid var(--table-border);
            color: var(--text-main);
        }

        th { background: var(--th-bg); color: var(--text-muted); font-weight: 600; }

        footer {
            margin-top: auto;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 1rem 0;
        }

        /* === DEFECT MODAL === */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--nav-border);
            border-radius: 1.25rem;
            padding: 1.5rem;
            width: min(720px, 95vw);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }
        .modal-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--danger);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .modal-close:hover { transform: scale(1.15); }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .modal-model-section {
            background: var(--th-bg);
            border-radius: 0.75rem;
            padding: 0.75rem;
            border: 1px solid var(--table-border);
        }
        .modal-model-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
        .step-bar-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
            font-size: 0.75rem;
        }
        .step-bar-label { width: 140px; flex-shrink: 0; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .step-bar-track { flex: 1; background: var(--table-border); border-radius: 4px; height: 14px; }
        .step-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(to right, #1a3a8a, var(--primary)); }
        .step-bar-count { width: 32px; text-align: right; font-weight: 700; color: var(--danger); }
        /* fail cell clickable style */
        .fail-cell {
            cursor: pointer;
            text-decoration: underline dotted;
            transition: color 0.2s;
        }
        .fail-cell:hover { color: #b91c1c !important; }
        
        /* date cell clickable style */
        .date-cell {
            cursor: pointer;
            text-decoration: underline dotted;
            transition: color 0.2s;
        }
        .date-cell:hover { color: var(--primary) !important; }

        /* date button scroll list */
        .date-btn-list {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            scrollbar-width: thin;
        }
        .date-btn {
            background: var(--nav-bg);
            border: 1px solid var(--nav-border);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .date-btn:hover { background: var(--primary); color: white; }
        .date-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(99,102,241,0.3); }
    </style>
</head>
<body>
    <!-- Navigation Sidebar -->
    <nav class="nav-sidebar" id="nav-sidebar" style="z-index: 1000;">
        <a href="dashboard.html" class="nav-item" id="nav-home" title="종합 대시보드">
            <span class="icon">🏠</span>
            <span class="label">종합</span>
        </a>
        <div class="nav-divider"></div>
        <!-- Line links will be injected here -->
        <button class="theme-btn" id="theme-toggle-btn" title="테마 전환" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
        </button>
    </nav>

    <!-- Main Container -->
    <div class="container" id="main-container">
        <!-- Sidebar Segment -->
        <aside class="sidebar" id="sidebar" style="position: relative; padding-bottom: 2rem;">
            <div id="sidebar-top-section" style="display: flex; flex-direction: column; gap: 1rem;">
                <header style="display: flex; align-items: start; justify-content: space-between;">
                    <div>
                        <h1 id="sidebar-title" style="font-size: 1.1rem;">ICT Dashboard</h1>
                        <p id="sidebar-subtitle" style="font-size: 0.75rem;">Performance Metrics</p>
                    </div>
                </header>

                <!-- Update Button (Repositioned) -->
                <div style="position: relative; margin: 0.2rem 0;">
                    <button id="update-btn" onclick="triggerUpdate()" title="데이터 업데이트" style="width: 100%; height: 38px; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem; transition: all 0.3s ease; box-shadow: 0 2px 6px rgba(99, 102, 241, 0.2); font-family: inherit;">
                        <span id="update-icon" style="font-size: 1rem;">🔄</span>
                        <span style="font-size: 0.8rem; font-weight: 700;">데이터 업데이트</span>
                    </button>
                    <p id="update-status" style="position: absolute; right: 0; top: 100%; width: 100%; font-size: 0.6rem; color: var(--text-muted); text-align: center; background: var(--card-bg); padding: 4px 8px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none; z-index: 100;"></p>
                </div>

                <div id="stats-area">
                    <!-- Overall Stats here for Overview mode -->
                </div>

            </div>

            <div class="stat-card compact" id="summary-card" style="margin-top: 0; flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column;">
                <h2 id="summary-title" style="flex-shrink:0; margin-bottom: 0.5rem; color: var(--primary); font-size: 0.9rem;">📊 상세 요약</h2>
                <div style="flex: 1; overflow-y: auto; min-height: 0;">
                    <table id="summary-table">
                        <thead>
                            <tr>
                                <th id="th-line">라인</th>
                                <th id="th-total">전체</th>
                                <th id="th-rate">직행율</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <footer style="position: absolute; bottom: 0.5rem; left: 0; width: 100%; text-align: center; font-size: 0.7rem; color: var(--text-muted); pointer-events: none;">
                &copy; 2026 ICT Data Team
            </footer>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- OVERVIEW VIEW -->
            <div id="overview-view" style="display: none; height: 100%; flex-direction: column; gap: 1rem;">
                <div class="stat-card" style="flex-shrink: 0; max-height: 250px;">
                    <h3 style="font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: none; font-weight: 700;">
                        <span style="color: var(--primary); margin-right: 0.5rem;">●</span> 3월 일간 평균 직행율 추이
                    </h3>
                    <div style="height: 180px; width: 100%;">
                        <canvas id="daily-avg-chart"></canvas>
                    </div>
                </div>

                <div class="scroll-area">
                    <div class="sheets-grid" id="sheets-grid">
                        <!-- Cards -->
                    </div>
                </div>
            </div>

            <!-- DEEP-DIVE VIEW (MATCHING IMAGE LAYOUT) -->
            <div id="deep-dive-view" style="display: none; height: 100%; flex-direction: column; gap: 1rem; overflow: hidden; padding: 0.5rem 1rem 1rem 0; width: 100%;">
                
                <!-- NEW TOP HEADER: Line Title & Update Button side-by-side -->
                <div style="display: flex; align-items: center; gap: 2rem; margin-bottom: 0.5rem; flex-shrink: 0; padding-left: 0.5rem;">
                    <h1 id="deep-dive-title" style="font-size: 1.8rem; font-weight: 800; color: var(--primary);">Line 2A</h1>
                    <button id="deep-dive-update-btn" onclick="triggerUpdate()" title="데이터 업데이트" style="padding: 0.4rem 0.8rem; border-radius: 4px; border: none; background: var(--primary); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.4rem; transition: all 0.3s ease; box-shadow: 0 2px 6px rgba(99, 102, 241, 0.2); font-family: inherit;">
                        <span id="update-icon-deep" style="font-size: 0.8rem;">🔄</span>
                        <span style="font-size: 0.7rem; font-weight: 700;">데이터 업데이트</span>
                    </button>
                    <p id="update-status-deep" style="font-size: 0.7rem; color: var(--text-muted); margin-left: auto;"></p>
                </div>

                <!-- ROW 1: Yield Rate (Left) and Models (Right) -->
                <div style="display: flex; gap: 1rem; flex-shrink: 0; min-height: 180px; height: 180px;">
                    <!-- Yield card -->
                    <div id="deep-dive-yield-card" style="flex: 0.35;"></div>
                    <!-- Models card -->
                    <div id="deep-dive-models-card" class="stat-card" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 1rem 1.5rem;">
                         <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                             <h3 style="font-size: 1rem; color: var(--primary); font-weight: 700;">📦 생산 모델 (모델별 직행율 분석)</h3>
                             <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: 500;">(스크롤하여 전체 모델 확인)</span>
                         </div>
                         <div style="flex: 1; overflow-y: auto; border-radius: 8px;">
                             <table id="deep-dive-summary-table">
                                 <thead style="position: sticky; top: 0; z-index: 2;">
                                     <tr style="background: var(--card-bg);">
                                         <th style="text-align: left; padding: 0.6rem; font-size: 0.85rem; border-bottom: 2px solid var(--table-border);">모델명 (Worst1 Step)</th>
                                         <th style="padding: 0.6rem; font-size: 0.85rem; border-bottom: 2px solid var(--table-border);">생산량</th>
                                         <th style="padding: 0.6rem; font-size: 0.85rem; border-bottom: 2px solid var(--table-border);">직행율</th>
                                     </tr>
                                 </thead>
                                 <tbody></tbody>
                             </table>
                         </div>
                    </div>
                </div>

                <!-- ROW 2: Hourly Analysis (Left) and Daily Records (Right) -->
                <div style="display: flex; gap: 1rem; flex: 1; min-height: 0;">
                    <!-- Hourly Analysis Chart -->
                    <div class="stat-card" style="flex: 1.3; display: flex; flex-direction: column; padding: 1.5rem; overflow: hidden;">
                        <h2 id="deep-dive-hourly-title" style="font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.8rem;">시간대별 분석추이 — 전체</h2>
                        <div id="date-btn-container" class="date-btn-list" style="flex-shrink: 0; margin-bottom: 1rem; border-bottom: 1px solid var(--table-border); padding-bottom: 0.5rem;">
                            <!-- JS will populate dates -->
                        </div>
                        <div style="flex: 1; position: relative; min-height: 0;">
                            <canvas id="hourly-trend-chart"></canvas>
                        </div>
                    </div>

                    <!-- Daily History Table -->
                    <div class="stat-card" style="flex: 0.8; display: flex; flex-direction: column; padding: 1.5rem; overflow: hidden;">
                        <h2 style="font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 1rem;">일자별 상세 기록</h2>
                        <div style="flex: 1; overflow-y: auto; border-radius: 8px;">
                            <table id="line-detail-table">
                                <thead style="position: sticky; top: 0; z-index: 2;">
                                    <tr style="background: var(--card-bg);">
                                        <th style="padding: 0.8rem 0.4rem; border-bottom: 2px solid var(--table-border); font-size: 0.8rem;">일자</th>
                                        <th style="padding: 0.8rem 0.4rem; border-bottom: 2px solid var(--table-border); font-size: 0.8rem;">전체</th>
                                        <th style="padding: 0.8rem 0.4rem; border-bottom: 2px solid var(--table-border); font-size: 0.8rem;">합격(G)</th>
                                        <th style="padding: 0.8rem 0.4rem; border-bottom: 2px solid var(--table-border); font-size: 0.8rem;">불합격(N)</th>
                                        <th style="padding: 0.8rem 0.4rem; border-bottom: 2px solid var(--table-border); font-size: 0.8rem;">직행율</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Defect Modal -->
    <div class="modal-overlay" id="defect-modal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">모델별 불량 STEP 분석</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Error Overlay -->
    <div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; padding: 2rem; text-align: center;">
        <div style="background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid var(--danger);">
            <h2 style="color: var(--danger); margin-bottom: 1rem;">❌ 오류 발생</h2>
            <p id="error-message" style="margin-bottom: 1.5rem;"></p>
            <button onclick="location.reload()" style="padding: 0.5rem 1.5rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; cursor: pointer;">새로고침</button>
        </div>
    </div>

    <script>
        // DATA_INJECTION_PLACEHOLDER
        // CONTEXT_INJECTION_PLACEHOLDER

        function logger(msg) { console.log(`[ICT_DASHBOARD] ${new Date().toLocaleTimeString()} - ${msg}`); }
        function id(n) { return document.getElementById(n); }

        if (typeof Chart !== 'undefined') {
            Chart.register(ChartDataLabels);
            logger("Chart.js ready");
        }

        function initNavigation() {
            const nav = id('nav-sidebar');
            if (typeof allLineIds === 'undefined') return;
            if (typeof activeLineId === 'undefined' || activeLineId === null) id('nav-home').classList.add('active');

            allLineIds.sort().forEach(lineId => {
                const a = document.createElement('a');
                a.href = `dashboard_${lineId}.html`;
                a.className = `nav-item ${typeof activeLineId !== 'undefined' && activeLineId === lineId ? 'active' : ''}`;
                a.innerHTML = `<span class="icon">L</span><span class="label" style="font-size:0.6rem;">${lineId}</span>`;
                nav.appendChild(a);
            });
        }

        function renderSidebarStats(data) {
            const area = id('stats-area');
            const rate = data.pass_rate;
            
            area.innerHTML = `
                <div class="stat-card" style="padding: 1.5rem 1.25rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 220px;">
                    <h3 style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; text-align: center; width: 100%; font-weight: 700;">ICT 직행율</h3>
                    <div style="font-size: 4.2rem; font-weight: 900; line-height: 1; letter-spacing: -2px; color: ${rate < 95 ? 'var(--danger)' : 'var(--primary)'}; margin: 0.5rem 0; text-shadow: 0 4px 12px rgba(0,0,0,0.05);">
                        ${rate}<span style="font-size: 1.8rem; font-weight: 700; color: var(--text-muted); margin-left: -2px;">%</span>
                    </div>
                    <div style="width: 100%; border-top: 1px solid var(--table-border); padding-top: 1.25rem; margin-top: 1rem; display: flex; flex-direction: column; gap: 0.6rem;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                            <span style="color: var(--text-muted);">전체 생산</span><span style="font-weight:700;">${data.total.toLocaleString()}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                            <span style="color: var(--text-muted);">합격 / 불합격</span>
                            <span><span style="color:var(--success); font-weight:700;">${data.pass.toLocaleString()}</span> / <span style="color:var(--danger); font-weight:700;">${data.fail.toLocaleString()}</span></span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOverview() {
            id('overview-view').style.display = 'flex';
            id('deep-dive-view').style.display = 'none';
            
            // Show sidebar only in Overview mode
            id('nav-sidebar').style.display = 'flex';
            id('sidebar').style.display = 'flex';
            
            id('stats-area').style.display = 'block';
            id('summary-card').style.display = 'flex';
            
            id('sidebar-title').innerText = 'ICT Dashboard';
            renderSidebarStats(rawData.overall);
            
            new Chart(id('daily-avg-chart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: rawData.daily_averages.map(d => d.date),
                    datasets: [{
                        data: rawData.daily_averages.map(d => d.pass_rate),
                        backgroundColor: 'rgba(99, 102, 241, 0.7)',
                        borderRadius: 4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        datalabels: { anchor: 'end', align: 'top', font: { size: 9 }, formatter: (v) => v + '%' }
                    },
                    scales: { 
                        y: { min: 80, max: 100, ticks: { font: { size: 9 } } },
                        x: { ticks: { font: { size: 8 }, maxRotation: 45 } }
                    }
                }
            });

            const grid = id('sheets-grid');
            rawData.lines.forEach((line, idx) => {
                const card = document.createElement('div');
                card.className = 'sheet-card';
                card.onclick = () => window.location.href = `dashboard_${line.line_id}.html`;
                card.innerHTML = `
                    <div class="sheet-header">
                        <div class="sheet-title">Line ${line.line_id}</div>
                        <div class="badge" style="background:${line.pass_rate < 95 ? '#fee2e2':'#d1fae5'}; color:${line.pass_rate < 95 ? '#991b1b':'#065f46'}">
                            ${line.pass_rate}%
                        </div>
                    </div>
                    <div style="height: 60px;"><canvas id="mini-chart-${idx}"></canvas></div>
                `;
                grid.appendChild(card);
                new Chart(id(`mini-chart-${idx}`).getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: line.trend.map(d => d.date),
                        datasets: [{
                            data: line.trend.map(d => d.pass_rate),
                            borderColor: 'var(--primary)',
                            tension: 0.4,
                            pointRadius: 0,
                            fill: true,
                            backgroundColor: 'rgba(99, 102, 241, 0.05)'
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { x: { display: false }, y: { display: false, min: 80, max: 105 } } }
                });
            });

            const tbody = document.querySelector('#summary-table tbody');
            rawData.lines.forEach(line => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:700; color:var(--primary)">${line.line_id}</td>
                    <td>${line.total.toLocaleString()}</td>
                    <td style="color:${line.pass_rate < 95 ? 'var(--danger)':'var(--success)'}; font-weight:700;">${line.pass_rate}%</td>
                `;
                tbody.appendChild(tr);
            });
            setTimeout(alignHeights, 50);
        }

        function alignHeights() {
            // Deprecated: Side-by-side flex layout naturally heights everything to 100% of container.
        }
        window.addEventListener('resize', alignHeights);

        function renderDeepDive(lineId) {
            const line = rawData.lines.find(l => l.line_id === lineId);
            if (!line) return;

            // Hide sidebar for Deep-Dive to match user's full-width image
            id('nav-sidebar').style.display = 'none';
            id('sidebar').style.display = 'none';

            id('deep-dive-view').style.display = 'flex';
            id('deep-dive-title').innerText = `Line ${lineId}`;
            
            // Hide sidebar metrics in Line mode
            id('stats-area').style.display = 'none';
            id('summary-card').style.display = 'none';

            // Populate Top Metrics
            const yieldContainer = id('deep-dive-yield-card');
            const rate = line.pass_rate;
            yieldContainer.innerHTML = `
                <div class="stat-card" style="padding: 0.8rem 1rem; display: flex; flex-direction: row; align-items: center; gap: 0.8rem; height: 100%; border-left: 4px solid ${rate < 95 ? 'var(--danger)' : 'var(--primary)'};">
                    <div style="flex: 1; text-align: center;">
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.2rem; font-weight: 700;">ICT 직행율</p>
                        <div style="font-size: 2.8rem; font-weight: 900; color: ${rate < 95 ? 'var(--danger)' : 'var(--primary)'}; line-height: 1;">
                            ${rate}<span style="font-size: 1rem; color: var(--text-muted);">%</span>
                        </div>
                    </div>
                    <div style="width: 1px; background: var(--table-border); height: 60%;"></div>
                    <div style="flex: 1.3; display: flex; flex-direction: column; gap: 0.3rem;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                            <span style="color:var(--text-muted)">전체생산:</span>
                            <b style="color:var(--text-main)">${line.total.toLocaleString()}</b>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                            <span style="color:var(--success)">합격(G):</span>
                            <b style="color:var(--success)">${line.pass.toLocaleString()}</b>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                            <span style="color:var(--danger)">불합격(N):</span>
                            <b style="color:var(--danger)">${line.fail.toLocaleString()}</b>
                        </div>
                    </div>
                </div>
            `;

            const tbody = document.querySelector('#deep-dive-summary-table tbody');
            tbody.innerHTML = '';
            if (line.model_stats) {
                line.model_stats.forEach(m => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-size:0.75rem; text-align:left; padding: 0.5rem;">
                            <div style="font-weight:700; color:var(--text-main); font-size:0.8rem;">${m.name}</div>
                            ${m.worst1_step ? `<div style="color:var(--danger); font-size:0.65rem; margin-top:0.2rem;">⚠️ Worst: ${m.worst1_step}</div>` : `<div style="color:var(--text-muted); font-size:0.65rem; margin-top:0.2rem;">-</div>`}
                        </td>
                        <td style="font-size:0.8rem; padding: 0.5rem; font-weight:600;">${m.total.toLocaleString()}</td>
                        <td style="font-size:0.85rem; font-weight:700; color:${m.pass_rate < 95 ? 'var(--danger)':'var(--success)'}; padding: 0.5rem;">${m.pass_rate}%</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            window.currentLineData = line;
            const latestDate = line.trend.length > 0 ? line.trend[line.trend.length - 1].date : null;
            renderHourlyChart(line, latestDate);

            const recordBody = id('line-detail-table').querySelector('tbody');
            recordBody.innerHTML = '';
            line.trend.slice().reverse().forEach(d => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="date-cell" style="font-weight:700;" onclick="renderHourlyChart(window.currentLineData, '${d.date}')">${d.date} 📊</td>
                    <td>${d.total.toLocaleString()}</td>
                    <td style="color:var(--success)">${d.pass.toLocaleString()}</td>
                    <td class="fail-cell" style="color:var(--danger); font-weight:700;" onclick="showFailModal('${lineId}', '${d.date}')">${d.fail.toLocaleString()} 🔍</td>
                    <td style="font-weight:700; color:${d.pass_rate < 95 ? 'var(--danger)':'var(--primary)'}">${d.pass_rate}%</td>
                `;
                recordBody.appendChild(tr);
            });
        }

        function renderHourlyChart(line, filterDate) {
            if (!line) return;
            const hrCanvas = id('hourly-trend-chart');
            const titleEl = id('hourly-chart-title');
            
            // Build date buttons
            const btnContainer = id('date-btn-container');
            if (btnContainer) {
                btnContainer.innerHTML = '';
                // "All" button
                const allBtn = document.createElement('button');
                allBtn.className = `date-btn ${!filterDate ? 'active' : ''}`;
                allBtn.innerText = '전체 보기';
                allBtn.onclick = () => renderHourlyChart(line, null);
                btnContainer.appendChild(allBtn);

                // Individual date buttons
                line.trend.slice().reverse().forEach(d => {
                    const btn = document.createElement('button');
                    btn.className = `date-btn ${filterDate === d.date ? 'active' : ''}`;
                    btn.innerText = d.date;
                    btn.onclick = () => renderHourlyChart(line, d.date);
                    btnContainer.appendChild(btn);
                });
            }

            let data = line.hourly_trend || [];
            if (filterDate) {
                data = data.filter(d => d.time_slot.startsWith(filterDate));
                if(titleEl) titleEl.innerText = `시간대별 분석추이 — ${filterDate}`;
            } else {
                if(titleEl) titleEl.innerText = `시간대별 분석추이 — 전체`;
            }

            if (window.hourlyChartInstance) window.hourlyChartInstance.destroy();
            
            if (data.length > 0) {
                window.hourlyChartInstance = new Chart(hrCanvas.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: filterDate ? data.map(d => d.time_slot.replace(filterDate + ' ', '')) : data.map(d => d.time_slot),
                        datasets: [{
                            label: '직행율 (%)',
                            data: data.map(d => d.pass_rate),
                            yAxisID: 'y',
                            type: 'line',
                            borderColor: 'var(--primary)',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#fff', pointBorderWidth: 2,
                            order: 1,
                            datalabels: { display: false }
                        }, {
                            label: '생산량 (수량)',
                            data: data.map(d => d.total),
                            yAxisID: 'y1',
                            type: 'bar',
                            backgroundColor: 'rgba(168, 85, 247, 0.7)',
                            borderRadius: 4,
                            order: 2,
                            datalabels: { 
                                display: true, 
                                align: 'top', 
                                font: { weight: 'bold', size: 10 }, 
                                formatter: (v, ctx) => [v.toLocaleString(), data[ctx.dataIndex].pass_rate + '%'], 
                                color: 'var(--text-main)',
                                textAlign: 'center'
                            }
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { position: 'top', align: 'end' } },
                        scales: {
                            x: { grid: { color: 'rgba(0,0,0,0.05)' } },
                            y: { type: 'linear', display: true, position: 'left', min: 70, max: 100, grid: { color: 'rgba(0,0,0,0.05)' } },
                            y1: { type: 'linear', display: true, position: 'right', min: 0, grid: { drawOnChartArea: false } }
                        }
                    }
                });
            } else {
                hrCanvas.getContext('2d').clearRect(0, 0, hrCanvas.width, hrCanvas.height);
            }
        }

        function showFailModal(lineId, date) {
            const line = rawData.lines.find(l => l.line_id === lineId);
            if (!line || !line.fail_steps) return;
            const modal = id('defect-modal');
            const title = id('modal-title');
            const body  = id('modal-body');
            title.innerText = `Line ${lineId} — ${date || '전체'} 불량 STEP 분석`;
            body.innerHTML = '';

            const fs = line.fail_steps;
            const models = Object.keys(fs).sort();
            if (models.length === 0) {
                body.innerHTML = '<p style="color:var(--text-muted);text-align:center">STEP 데이터 없음</p>';
            } else {
                models.forEach(model => {
                    const steps = fs[model];
                    if (!steps || steps.length === 0) return;
                    const maxCount = steps[0].count || 1;
                    const sec = document.createElement('div');
                    sec.className = 'modal-model-section';
                    let rows = steps.map(s => `
                        <div class="step-bar-row">
                            <div class="step-bar-label" title="${s.step}">${s.step}</div>
                            <div class="step-bar-track"><div class="step-bar-fill" style="width:${Math.round(s.count/maxCount*100)}%"></div></div>
                            <div class="step-bar-count">${s.count}</div>
                        </div>
                    `).join('');
                    sec.innerHTML = `<div class="modal-model-title">📦 ${model}</div>${rows}`;
                    body.appendChild(sec);
                });
            }
            modal.classList.add('open');
        }

        function closeModal() {
            id('defect-modal').classList.remove('open');
        }

        // Close modal on background click
        id('defect-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-theme');
            id('theme-icon').innerText = isDark ? '☀️' : '🌙';
            localStorage.setItem('ict_theme', isDark ? 'dark' : 'light');
        }

        // Restore saved theme
        (function() {
            const saved = localStorage.getItem('ict_theme');
            if (saved === 'dark') {
                document.body.classList.add('dark-theme');
                const btn = id('theme-icon');
                if (btn) btn.innerText = '☀️';
            }
        })();

        async function triggerUpdate() {
            const btn = id('update-btn');
            const icon = id('update-icon');
            const status = id('update-status');
            
            const btnDeep = id('deep-dive-update-btn');
            const iconDeep = id('update-icon-deep');
            const statusDeep = id('update-status-deep');

            const setStatus = (msg, color) => {
                if(status) { status.innerText = msg; status.style.color = color; status.style.display = 'block'; }
                if(statusDeep) { statusDeep.innerText = msg; statusDeep.style.color = color; }
            };

            const toggleSpin = (isSpinning) => {
                if(icon) icon.style.animation = isSpinning ? 'spin 1s linear infinite' : 'none';
                if(iconDeep) iconDeep.style.animation = isSpinning ? 'spin 1s linear infinite' : 'none';
                if(btn) btn.disabled = isSpinning;
                if(btnDeep) btnDeep.disabled = isSpinning;
            };

            toggleSpin(true);
            setStatus('Excel 데이터 분석 및 파일 생성 중...', 'var(--text-muted)');

            try {
                const response = await fetch('/api/update', { method: 'POST' });
                const result = await response.json();

                if (result.success) {
                    setStatus('✅ 업데이트 완료! 곧 새로고침합니다.', 'var(--success)');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    throw new Error(result.message || '업데이트 실패');
                }
            } catch (e) {
                console.error(e);
                setStatus('❌ 오류: ' + e.message, 'var(--danger)');
                toggleSpin(false);
            }
        }

        // CSS for spinning icon
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);

        try {
            if (typeof rawData === 'undefined') throw new Error("Data Error");
            initNavigation();
            if (typeof activeLineId !== 'undefined' && activeLineId !== null) renderDeepDive(activeLineId);
            else renderOverview();
        } catch (e) {
            id('error-overlay').style.display = 'flex';
            id('error-message').innerText = e.message;
        }
    </script>
</body>
</html>
